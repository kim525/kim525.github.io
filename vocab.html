<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的韓文單字卡</title>
    <style>
        /* 簡單的樣式，確保版面正常 */
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .vocab-list { display: flex; flex-wrap: wrap; gap: 15px; }
        .flashcard { background: white; border: 1px solid #ddd; padding: 20px; width: 250px; cursor: pointer; transition: transform 0.3s; position: relative; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-back { display: none; }
        .flashcard.flipped .flashcard-front { display: none; }
        .flashcard.flipped .flashcard-back { display: block; transform: rotateY(180deg); }
        .card-actions { margin-top: 15px; display: flex; gap: 5px; }
        .action-btn { padding: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>韓文單字卡</h1>

    <section class="vocab-list">
        <div class="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="flashcard-front">
                <div class="word-main">된장찌개</div>
                <div class="pronunciation">doen-jang-jji-gae</div>
                <div class="example">저는 된장찌개가 제일 좋아해요.<br>（我最喜歡大醬湯。）</div>
                <div class="card-actions">
                    <button class="action-btn" onclick="event.stopPropagation(); playSound('된장찌개')">🔊 發音</button>
                    <button class="action-btn" onclick="event.stopPropagation(); saveVocab(this)">🔖 儲存</button>
                </div>
            </div>
            <div class="flashcard-back">
                <div class="meaning">大醬湯</div>
            </div>
        </div>

        <div class="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="flashcard-front">
                <div class="word-main">커피</div>
                <div class="pronunciation">keo-pi</div>
                <div class="example">커피 한 잔 주세요.<br>（請給我一杯咖啡。）</div>
                <div class="card-actions">
                    <button class="action-btn" onclick="event.stopPropagation(); playSound('커피')">🔊 發音</button>
                    <button class="action-btn" onclick="event.stopPropagation(); saveVocab(this)">🔖 儲存</button>
                </div>
            </div>
            <div class="flashcard-back">
                <div class="meaning">咖啡</div>
            </div>
        </div>

    </section>

    <script>
        // 儲存功能的函數
        function saveVocab(btn) {
            btn.innerText = "✅ 已儲存";
            btn.style.backgroundColor = "#e0ffe0";
            console.log("已儲存");
        }

        // 發音功能的函數
        function playSound(word) {
            console.log("正在播放: " + word);
            // 這裡未來可以加入語音 API
        }
    </script>
</body>
</html>
