<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的資源 — 已儲存的學習資源</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    :root {
      --primary-color: #FF6B6B;
      --secondary-color: #4ECDC4;
      --dark-color: #2D3047;
      --light-color: #F7F9FC;
      --gray-color: #E9ECEF;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'PingFang TC', 'Microsoft JhengHei', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    body {
      background-color: var(--light-color);
      color: var(--dark-color);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    .mobile-container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0,0,0,0.08);
      position: relative;
      overflow-x: hidden;
    }
    
    /* Header */
    .page-header {
      background: linear-gradient(135deg, var(--secondary-color), #7eddd6);
      color: white;
      padding: 50px 24px 20px;
      text-align: center;
      position: relative;
    }
    
    .page-header h1 {
      font-size: 2.1rem;
      margin-bottom: 8px;
      font-weight: 700;
    }
    
    .page-header p {
      font-size: 1rem;
      opacity: 0.9;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: #888;
    }
    
    .empty-state i {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .empty-state h3 {
      font-size: 1.3rem;
      margin-bottom: 10px;
      color: #666;
    }
    
    .empty-state p {
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    
    .empty-state a {
      display: inline-block;
      background: var(--secondary-color);
      color: white;
      padding: 14px 32px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
    }
    
    /* Resources List */
    .resources-list {
      padding: 20px;
    }
    
    .resource-card {
      background: white;
      border: 1px solid var(--gray-color);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .resource-type {
      display: inline-block;
      background: var(--secondary-color);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    
    .resource-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .resource-desc {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    
    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      background: var(--light-color);
      color: var(--dark-color);
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
    }
    
    .action-btn:hover {
      background: var(--gray-color);
    }
    
    .action-btn.primary {
      background: var(--primary-color);
      color: white;
    }
    
    .action-btn.primary:hover {
      background: #ff5252;
    }
    
    .action-btn.danger {
      background: #ff4757;
      color: white;
    }
    
    .action-btn.danger:hover {
      background: #ff3344;
    }
    
    /* Footer */
    .page-footer {
      background: var(--dark-color);
      color: white;
      padding: 40px 24px 100px;
      text-align: center;
      margin-top: 40px;
    }
    
    .footer-content p {
      margin: 8px 0;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    
    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 500px;
      margin: 0 auto;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      border-top: 1px solid var(--gray-color);
      box-shadow: 0 -4px 16px rgba(0,0,0,0.07);
      z-index: 100;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #666;
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.25s;
    }
    
    .nav-item.active {
      color: var(--primary-color);
    }
    
    .nav-icon {
      font-size: 1.7rem;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>
  <div class="mobile-container">
    
    <!-- Header -->
    <header class="page-header">
      <h1>我的資源</h1>
      <p>已儲存的學習資源</p>
    </header>
    
    <!-- Resources List -->
    <section class="resources-list" id="savedResources">
      <!-- Saved resources will be loaded here -->
    </section>
    
    <!-- Empty State (hidden by default) -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <i class="fas fa-bookmark"></i>
      <h3>還沒有儲存的資源</h3>
      <p>去資源頁面儲存你喜歡的學習資源吧！</p>
      <a href="Resources.html">前往資源頁面</a>
    </div>
    
    <!-- Footer -->
    <footer class="page-footer">
      <div class="footer-content">
        <p>&copy; 2026 K-City. All rights reserved.</p>
        <p>Learn Korean through interactive tasks and real-life scenarios!</p>
      </div>
    </footer>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <div>首頁</div>
    </a>
    <a href="vocab.html" class="nav-item">
      <div class="nav-icon">📚</div>
      <div>詞彙</div>
    </a>
    <a href="Stats.html" class="nav-item">
      <div class="nav-icon">📊</div>
      <div>統計</div>
    </a>
    <a href="StudyHub.html" class="nav-item">
      <div class="nav-icon">🔌</div>
      <div>IoT</div>
    </a>
    <a href="Resources.html" class="nav-item">
      <div class="nav-icon">🌐</div>
      <div>資源</div>
    </a>
    <a href="save.html" class="nav-item active">
      <div class="nav-icon">💾</div>
      <div>儲存</div>
    </a>
    <a href="Community.html" class="nav-item">
      <div class="nav-icon">👥</div>
      <div>社區</div>
    </a>
    <a href="chat.html" class="nav-item">
      <div class="nav-icon">💬</div>
      <div>聊天</div>
    </a>
  </nav>
    
  </div>
  
  <script>
    // Load saved items from localStorage
    document.addEventListener('DOMContentLoaded', function() {
      const savedResources = JSON.parse(localStorage.getItem('savedResources') || '[]');
      const savedVocab = JSON.parse(localStorage.getItem('savedVocab') || '[]');
      const resourcesContainer = document.getElementById('savedResources');
      const emptyState = document.getElementById('emptyState');
      
      // Vocab cards
      savedVocab.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'resource-card';
        card.innerHTML = `
          <div class="resource-type" style="background: var(--primary-color);">${item.type}</div>
          <div class="resource-title">${item.word}</div>
          <div class="resource-desc">${item.pronunciation || ''}</div>
          <div class="resource-desc" style="color: var(--primary-color); font-weight: 600;">${item.meaning}</div>
          <div class="card-actions">
            <button class="action-btn danger" onclick="removeVocab(${index})">
              <i class="fas fa-trash"></i> 刪除
            </button>
          </div>
        `;
        resourcesContainer.appendChild(card);
      });
      
      // Resource cards
      savedResources.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'resource-card';
        card.innerHTML = `
          <div class="resource-type">${item.type}</div>
          <div class="resource-title">${item.title}</div>
          <div class="resource-desc">${item.desc}</div>
          <div class="card-actions">
            <a href="${item.link}" target="_blank" class="action-btn">
              <i class="fas fa-external-link-alt"></i> 前往
            </a>
            <button class="action-btn danger" onclick="removeResource(${index})">
              <i class="fas fa-trash"></i> 刪除
            </button>
          </div>
        `;
        resourcesContainer.appendChild(card);
      });
      
      // Show empty state if nothing saved
      if (savedVocab.length === 0 && savedResources.length === 0) {
        resourcesContainer.style.display = 'none';
        emptyState.style.display = 'block';
      } else {
        resourcesContainer.style.display = 'block';
        emptyState.style.display = 'none';
      }
    });
    
    // Remove vocab function
    function removeVocab(index) {
      if (confirm('確定要刪除這個單字嗎？')) {
        const savedVocab = JSON.parse(localStorage.getItem('savedVocab') || '[]');
        savedVocab.splice(index, 1);
        localStorage.setItem('savedVocab', JSON.stringify(savedVocab));
        location.reload();
      }
    }
    
    // Remove resource function
    function removeResource(index) {
      if (confirm('確定要刪除這個資源嗎？')) {
        const savedResources = JSON.parse(localStorage.getItem('savedResources') || '[]');
        savedResources.splice(index, 1);
        localStorage.setItem('savedResources', JSON.stringify(savedResources));
        location.reload();
      }
    }
  </script>
</body>
</html>
