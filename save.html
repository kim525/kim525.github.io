<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>我的詞彙 — 已儲存的單字</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    :root {
      --primary-color: #FF6B6B;
      --secondary-color: #4ECDC4;
      --dark-color: #2D3047;
      --light-color: #F7F9FC;
      --gray-color: #E9ECEF;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'PingFang TC', 'Microsoft JhengHei', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    body {
      background-color: var(--light-color);
      color: var(--dark-color);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    .mobile-container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0,0,0,0.08);
      position: relative;
      overflow-x: hidden;
    }
    
    .page-header {
      background: linear-gradient(135deg, var(--primary-color), #ff8e8e);
      color: white;
      padding: 50px 24px 20px;
      text-align: center;
    }
    
    .page-header h1 {
      font-size: 2.1rem;
      margin-bottom: 8px;
      font-weight: 700;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: #888;
    }
    
    .empty-state i {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .empty-state h3 {
      font-size: 1.3rem;
      margin-bottom: 10px;
      color: #666;
    }
    
    .empty-state p {
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    
    .empty-state a {
      display: inline-block;
      background: var(--primary-color);
      color: white;
      padding: 14px 32px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
    }
    
    .vocab-list {
      padding: 20px;
    }
    
    .flashcard {
      background: white;
      border: 1px solid var(--gray-color);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .word-main {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .pronunciation {
      font-size: 1rem;
      color: #666;
      margin-bottom: 8px;
    }
    
    .meaning {
      font-size: 1.2rem;
      color: var(--primary-color);
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      background: var(--light-color);
      color: var(--dark-color);
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
    }
    
    .action-btn:hover {
      background: var(--gray-color);
    }
    
    .action-btn.primary {
      background: var(--primary-color);
      color: white;
    }
    
    .action-btn.danger {
      background: #ff4757;
      color: white;
    }
    
    .page-footer {
      background: var(--dark-color);
      color: white;
      padding: 40px 24px 100px;
      text-align: center;
      margin-top: 40px;
    }
    
    .footer-content p {
      margin: 8px 0;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 500px;
      margin: 0 auto;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      border-top: 1px solid var(--gray-color);
      box-shadow: 0 -4px 16px rgba(0,0,0,0.07);
      z-index: 100;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #666;
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.25s;
    }
    
    .nav-item.active {
      color: var(--primary-color);
    }
    
    .nav-icon {
      font-size: 1.4rem;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>
  <div class="mobile-container">
    
    <header class="page-header">
      <h1>我的詞彙</h1>
      <p>已儲存的單字</p>
    </header>
    
    <section class="vocab-list" id="savedVocabList">
    </section>
    
    <div class="empty-state" id="emptyState" style="display: none;">
      <i class="fas fa-bookmark"></i>
      <h3>還沒有儲存的單字</h3>
      <p>去詞彙頁面儲存你喜歡的單字吧！</p>
      <a href="vocab.html">前往詞彙頁面</a>
    </div>
    
    <footer class="page-footer">
      <div class="footer-content">
        <p>&copy; 2026 K-City. All rights reserved.</p>
        <p>Learn Korean through interactive tasks and real-life scenarios!</p>
      </div>
    </footer>
    
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <div class="nav-icon">🏠</div>
        <div>首頁</div>
      </a>
      <a href="vocab.html" class="nav-item">
        <div class="nav-icon">📚</div>
        <div>詞彙</div>
      </a>
      <a href="Stats.html" class="nav-item">
        <div class="nav-icon">📊</div>
        <div>統計</div>
      </a>
      <a href="StudyHub.html" class="nav-item">
        <div class="nav-icon">🔌</div>
        <div>IoT</div>
      </a>
      <a href="Resources.html" class="nav-item">
        <div class="nav-icon">🌐</div>
        <div>資源</div>
      </a>
      <a href="Community.html" class="nav-item">
        <div class="nav-icon">👥</div>
        <div>社區</div>
      </a>
    </nav>
    
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const savedVocab = JSON.parse(localStorage.getItem('savedVocab') || '[]');
      const vocabContainer = document.getElementById('savedVocabList');
      const emptyState = document.getElementById('emptyState');
      
      if (savedVocab.length === 0) {
        vocabContainer.style.display = 'none';
        emptyState.style.display = 'block';
      } else {
        vocabContainer.style.display = 'block';
        emptyState.style.display = 'none';
        
        savedVocab.forEach((vocab, index) => {
          const card = document.createElement('div');
          card.className = 'flashcard';
          card.innerHTML = `
            <div class="word-main">${vocab.word}</div>
            <div class="pronunciation">${vocab.pronunciation}</div>
            <div class="meaning">${vocab.meaning}</div>
            <div class="card-actions">
              <button class="action-btn" onclick="speakWord('${vocab.word}')">
                <i class="fas fa-volume-up"></i> 發音
              </button>
              <button class="action-btn danger" onclick="removeVocab(${index})">
                <i class="fas fa-trash"></i> 刪除
              </button>
            </div>
          `;
          vocabContainer.appendChild(card);
        });
      }
    });
    
    function removeVocab(index) {
      if (confirm('確定要刪除這個單字嗎？')) {
        const savedVocab = JSON.parse(localStorage.getItem('savedVocab') || '[]');
        savedVocab.splice(index, 1);
        localStorage.setItem('savedVocab', JSON.stringify(savedVocab));
        location.reload();
      }
    }
    
    function speakWord(word) {
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = 'ko-KR';
      speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
