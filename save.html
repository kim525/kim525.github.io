<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的資源 — 已儲存的學習資源</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
<style>
    .nav-icon {
      font-size: 1.7rem;
      margin-bottom: 5px;
    }
    
    .tab-buttons {
      display: flex;
      gap: 10px;
      padding: 16px;
      background: white;
    }
    
    .tab-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--gray-color);
      border-radius: 12px;
      background: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }
    
    .tab-btn.active {
      background: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }
    
    .section-title {
      padding: 16px 16px 0;
      font-size: 1.3rem;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="mobile-container">
    
    <header class="page-header">
      <h1>我的資源</h1>
      <p>已儲存的學習資源</p>
    </header>
    
    <div class="tab-buttons">
      <button class="tab-btn active" onclick="showTab('vocab')">📚 詞彙</button>
      <button class="tab-btn" onclick="showTab('resources')">🌐 資源</button>
    </div>
    
    <div id="vocabSection">
      <h3 class="section-title">📚 已儲存的詞彙</h3>
    </div>
    
    <div id="resourcesSection" style="display: none;">
      <h3 class="section-title">🌐 已儲存的資源</h3>
    </div>
    
    <section class="resources-list" id="savedResources">
    </section>
    
    <div class="empty-state" id="emptyState" style="display: none;">
      <i class="fas fa-bookmark"></i>
      <h3>還沒有儲存的資源</h3>
      <p>去資源頁面儲存你喜歡的學習資源吧！</p>
      <a href="Resources.html">前往資源頁面</a>
    </div>
    
    <footer class="page-footer">
      <div class="footer-content">
        <p>&copy; 2026 K-City. All rights reserved.</p>
        <p>Learn Korean through interactive tasks and real-life scenarios!</p>
      </div>
    </footer>
    
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <div class="nav-icon">🏠</div>
        <div>首頁</div>
      </a>
      <a href="vocab.html" class="nav-item">
        <div class="nav-icon">📚</div>
        <div>詞彙</div>
      </a>
      <a href="Stats.html" class="nav-item">
        <div class="nav-icon">📊</div>
        <div>統計</div>
      </a>
      <a href="StudyHub.html" class="nav-item">
        <div class="nav-icon">🔌</div>
        <div>IoT</div>
      </a>
      <a href="Resources.html" class="nav-item">
        <div class="nav-icon">🌐</div>
        <div>資源</div>
      </a>
      <a href="save.html" class="nav-item active">
        <div class="nav-icon">💾</div>
        <div>儲存</div>
      </a>
      <a href="Community.html" class="nav-item">
        <div class="nav-icon">👥</div>
        <div>社群</div>
      </a>
    </nav>
    
  </div>
  
  <script>
    function showTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      document.getElementById('vocabSection').style.display = tab === 'vocab' ? 'block' : 'none';
      document.getElementById('resourcesSection').style.display = tab === 'resources' ? 'block' : 'none';
      
      const vocabList = document.getElementById('vocabList');
      const resourceList = document.getElementById('resourceList');
      
      if (tab === 'vocab') {
        vocabList.style.display = 'block';
        resourceList.style.display = 'none';
      } else {
        vocabList.style.display = 'none';
        resourceList.style.display = 'block';
      }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      const savedResources = JSON.parse(localStorage.getItem('savedResources') || '[]');
      const savedVocab = JSON.parse(localStorage.getItem('savedVocab') || '[]');
      const vocabContainer = document.getElementById('vocabList');
      const resourceContainer = document.getElementById('resourceList');
      const emptyState = document.getElementById('emptyState');
      
      document.getElementById('vocabList').style.display = 'block';
      document.getElementById('resourceList').style.display = 'none';
      
      if (savedResources.length === 0 && savedVocab.length === 0) {
        vocabContainer.style.display = 'none';
        resourceContainer.style.display = 'none';
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
        
        // Show saved vocab
        if (savedVocab.length > 0) {
          savedVocab.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'resource-card';
            card.innerHTML = `
              <div class="resource-type">詞彙</div>
              <div class="resource-title">${item.word}</div>
              <div class="resource-desc">${item.meaning} • ${item.pronunciation}</div>
              <div class="card-actions">
                <button class="action-btn" onclick="speakWord('${item.word}')">
                  <i class="fas fa-volume-up"></i> 發音
                </button>
                <button class="action-btn danger" onclick="removeVocab(${index})">
                  <i class="fas fa-trash"></i> 刪除
                </button>
              </div>
            `;
            vocabContainer.appendChild(card);
          });
        } else {
          vocabContainer.innerHTML = '<p style="padding:20px; color:#888;">還沒有儲存的詞彙</p>';
        }
        
        // Show saved resources
        if (savedResources.length > 0) {
          savedResources.forEach((resource, index) => {
            const card = document.createElement('div');
            card.className = 'resource-card';
            card.innerHTML = `
              <div class="resource-type">${resource.type}</div>
              <div class="resource-title">${resource.title}</div>
              <div class="resource-desc">${resource.desc}</div>
              <div class="card-actions">
                <a href="${resource.link}" target="_blank" class="action-btn">
                  <i class="fas fa-external-link-alt"></i> 前往
                </a>
                <button class="action-btn danger" onclick="removeResource(${index})">
                  <i class="fas fa-trash"></i> 刪除
                </button>
              </div>
            `;
            resourceContainer.appendChild(card);
          });
        } else {
          resourceContainer.innerHTML = '<p style="padding:20px; color:#888;">還沒有儲存的資源</p>';
        }
      }
    });
    
    function removeResource(index) {
      if (confirm('確定要刪除這個資源嗎？')) {
        const savedResources = JSON.parse(localStorage.getItem('savedResources') || '[]');
        savedResources.splice(index, 1);
        localStorage.setItem('savedResources', JSON.stringify(savedResources));
        location.reload();
      }
    }
    
    function removeVocab(index) {
      if (confirm('確定要刪除這個詞彙嗎？')) {
        const savedVocab = JSON.parse(localStorage.getItem('savedVocab') || '[]');
        savedVocab.splice(index, 1);
        localStorage.setItem('savedVocab', JSON.stringify(savedVocab));
        location.reload();
      }
    }
    
    function speakWord(word) {
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = 'ko-KR';
      speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
